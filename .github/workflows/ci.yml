name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    needs: wasm-build
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@v4
        with:
          name: crypto-core-wasm-pkg
          path: packages/crypto-core-wasm/pkg
      - run: pnpm typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: wasm-build
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@v4
        with:
          name: crypto-core-wasm-pkg
          path: packages/crypto-core-wasm/pkg
      - run: pnpm test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: wasm-build
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@v4
        with:
          name: crypto-core-wasm-pkg
          path: packages/crypto-core-wasm/pkg
      - run: pnpm build

  extension-e2e:
    name: Extension E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        run: pnpm --filter @zero-vault/extension exec playwright install --with-deps chromium
      - run: pnpm --filter @zero-vault/extension test:e2e

  web-e2e:
    name: Web Vault E2E
    runs-on: ubuntu-latest
    needs: wasm-build
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@v4
        with:
          name: crypto-core-wasm-pkg
          path: packages/crypto-core-wasm/pkg
      - name: Install Playwright browsers
        run: pnpm --filter @zero-vault/web exec playwright install --with-deps chromium
      - run: pnpm --filter @zero-vault/web test:e2e

  web-e2e-sync:
    name: Web Vault Sync E2E
    runs-on: ubuntu-latest
    continue-on-error: true
    needs: wasm-build
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
      - run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@v4
        with:
          name: crypto-core-wasm-pkg
          path: packages/crypto-core-wasm/pkg
      - name: Install Playwright browsers
        run: pnpm --filter @zero-vault/web exec playwright install --with-deps chromium
      - run: pnpm --filter @zero-vault/web test:e2e:sync

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  rust-test:
    name: Rust Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --manifest-path crates/crypto-core/Cargo.toml

  wasm-build:
    name: WASM Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - run: pnpm install --frozen-lockfile
      - run: pnpm wasm:build
      - uses: actions/upload-artifact@v4
        with:
          name: crypto-core-wasm-pkg
          path: packages/crypto-core-wasm/pkg

  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: pnpm audit
        run: pnpm audit --audit-level critical
      - uses: dtolnay/rust-toolchain@stable
      - name: cargo audit (advisory)
        continue-on-error: true
        run: |
          cargo install cargo-audit
          cargo audit --file crates/crypto-core/Cargo.toml
