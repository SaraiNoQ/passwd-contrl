<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <title>Zero Vault</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --color-bg-root: #050B12;
        --color-bg-shell: #07111D;
        --color-bg-panel: #0B1624;
        --color-bg-panel-soft: #101827;
        --color-border: #1F2937;
        --color-border-strong: #334155;
        --color-text-primary: #F8FAFC;
        --color-text-secondary: #CBD5E1;
        --color-text-muted: #94A3B8;
        --color-primary: #22D3EE;
        --color-success: #34D399;
        --color-warning: #F59E0B;
        --color-danger: #FB7185;
      }

      body {
        background: var(--color-bg-root);
        color: var(--color-text-primary);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
        margin: 0;
        min-width: 320px;
        max-height: 480px;
        overflow-y: auto;
        padding: 16px;
        line-height: 1.5;
      }

      /* Header */
      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 2px;
      }

      .header h1 {
        font-size: 15px;
        font-weight: 600;
        line-height: 22px;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .version {
        font-size: 11px;
        color: var(--color-text-muted);
        font-weight: 400;
        background: var(--color-bg-panel);
        border: 1px solid var(--color-border);
        border-radius: 4px;
        padding: 1px 5px;
      }

      /* Origin display */
      .origin-display {
        font-size: 11px;
        color: var(--color-text-muted);
        margin-bottom: 6px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        padding: 2px 0;
      }

      /* Connection status */
      .connection-status {
        font-size: 12px;
        color: var(--color-text-muted);
        margin-bottom: 12px;
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .dot {
        display: inline-block;
        width: 6px;
        height: 6px;
        border-radius: 50%;
      }

      .dot.connected { background: var(--color-success); box-shadow: 0 0 4px rgba(52, 211, 153, 0.5); }
      .dot.disconnected { background: var(--color-danger); box-shadow: 0 0 4px rgba(251, 113, 133, 0.4); }

      /* Status sections */
      .status-section {
        border: 1px solid var(--color-border);
        border-radius: 8px;
        padding: 10px 12px;
        margin-bottom: 8px;
        display: flex;
        align-items: flex-start;
        gap: 8px;
        font-size: 13px;
        line-height: 20px;
      }

      .status-icon {
        flex-shrink: 0;
        width: 16px;
        height: 16px;
        margin-top: 2px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
      }

      .status-section.http-blocked {
        border-color: rgba(245, 158, 11, 0.4);
        background: rgba(245, 158, 11, 0.06);
        color: #FCD34D;
      }

      .status-section.no-form {
        border-color: var(--color-border);
        background: var(--color-bg-panel);
        color: var(--color-text-muted);
      }

      .status-section.vault-locked {
        border-color: rgba(245, 158, 11, 0.4);
        background: rgba(245, 158, 11, 0.06);
        color: #FCD34D;
      }

      .status-section.no-matches {
        border-color: var(--color-border);
        background: var(--color-bg-panel);
        color: var(--color-text-muted);
      }

      .status-section.similar-warning {
        border-color: rgba(245, 158, 11, 0.4);
        background: rgba(245, 158, 11, 0.06);
        color: #FCD34D;
      }

      /* Section header */
      .section-header {
        font-size: 12px;
        font-weight: 600;
        color: var(--color-text-muted);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin: 12px 0 6px;
      }

      /* Credential list */
      .credentials {
        display: grid;
        gap: 8px;
        margin-top: 8px;
      }

      .credential {
        align-items: start;
        background: var(--color-bg-panel);
        border: 1px solid var(--color-border);
        border-radius: 8px;
        color: var(--color-text-primary);
        display: grid;
        gap: 2px;
        padding: 10px 12px;
        text-align: left;
        width: 100%;
        font: inherit;
        cursor: pointer;
        transition: border-color 0.15s, background 0.15s;
      }

      .credential:focus-visible,
      .credential.selected {
        outline: 2px solid var(--color-primary);
        outline-offset: 2px;
      }

      .credential:hover {
        border-color: var(--color-border-strong);
      }

      .credential .cred-title {
        font-weight: 600;
        font-size: 14px;
        line-height: 20px;
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .credential .cred-username {
        color: var(--color-text-muted);
        font-size: 12px;
        line-height: 18px;
      }

      /* Match type badges */
      .badge {
        font-size: 10px;
        font-weight: 600;
        padding: 1px 6px;
        border-radius: 4px;
        display: inline-block;
        vertical-align: middle;
      }

      .badge.exact {
        background: rgba(52, 211, 153, 0.15);
        color: var(--color-success);
      }

      .badge.similar {
        background: rgba(245, 158, 11, 0.15);
        color: #FBBF24;
      }

      .badge.suspicious {
        background: rgba(251, 113, 133, 0.15);
        color: #F87171;
      }

      /* Credential blocked row */
      .credential-blocked {
        align-items: start;
        background: rgba(251, 113, 133, 0.05);
        border: 1px solid rgba(251, 113, 133, 0.3);
        border-radius: 8px;
        color: var(--color-danger);
        display: grid;
        gap: 4px;
        padding: 10px 12px;
        text-align: left;
      }

      .credential-blocked .blocked-title {
        font-weight: 600;
        font-size: 14px;
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .credential-blocked .blocked-reason {
        font-size: 12px;
        color: var(--color-danger);
      }

      /* Fill button */
      .fill-btn {
        background: rgba(34, 211, 238, 0.1);
        border: 1px solid rgba(34, 211, 238, 0.3);
        border-radius: 6px;
        color: var(--color-primary);
        cursor: pointer;
        font: inherit;
        font-size: 12px;
        font-weight: 600;
        margin-top: 6px;
        padding: 5px 10px;
        transition: background 0.15s, border-color 0.15s;
      }

      .fill-btn:hover {
        background: rgba(34, 211, 238, 0.2);
        border-color: rgba(34, 211, 238, 0.5);
      }

      .fill-btn:focus-visible {
        outline: 2px solid var(--color-primary);
        outline-offset: 2px;
      }

      .fill-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      /* Acknowledge button */
      .acknowledge-btn {
        background: rgba(245, 158, 11, 0.12);
        border: 1px solid rgba(245, 158, 11, 0.35);
        border-radius: 6px;
        color: #FBBF24;
        cursor: pointer;
        font: inherit;
        font-size: 12px;
        font-weight: 600;
        margin-top: 6px;
        padding: 5px 10px;
        width: 100%;
        transition: background 0.15s;
      }

      .acknowledge-btn:hover {
        background: rgba(245, 158, 11, 0.22);
      }

      .acknowledge-btn:focus-visible {
        outline: 2px solid var(--color-warning);
        outline-offset: 2px;
      }

      /* Filling indicator */
      .filling-indicator {
        color: var(--color-primary);
        font-size: 12px;
        font-weight: 600;
        margin-top: 8px;
      }

      /* Match count */
      .match-count {
        font-size: 12px;
        color: var(--color-text-muted);
        margin: 4px 0 8px;
      }

      /* Empty state */
      .state-empty {
        text-align: center;
        padding: 16px 0;
      }

      .state-empty p {
        font-size: 13px;
        color: var(--color-text-muted);
      }

      /* Section divider */
      .section-divider {
        border: none;
        border-top: 1px solid var(--color-border);
        margin: 8px 0;
      }

      /* Bottom actions */
      .bottom-actions {
        display: flex;
        gap: 8px;
        margin-top: 12px;
        padding-top: 8px;
        border-top: 1px solid var(--color-border);
      }

      button.scan-btn {
        background: var(--color-bg-panel);
        border: 1px solid var(--color-border);
        border-radius: 8px;
        color: var(--color-text-primary);
        cursor: pointer;
        font: inherit;
        font-size: 13px;
        font-weight: 500;
        padding: 8px 12px;
        flex: 1;
        transition: border-color 0.15s, background 0.15s;
      }

      button.scan-btn:hover {
        border-color: var(--color-border-strong);
        background: var(--color-bg-panel-soft);
      }

      button.scan-btn:focus-visible {
        outline: 2px solid var(--color-primary);
        outline-offset: 2px;
      }

      a.vault-link {
        color: var(--color-primary);
        font-size: 13px;
        font-weight: 500;
        text-decoration: none;
        padding: 8px 12px;
        border: 1px solid var(--color-border);
        border-radius: 8px;
        text-align: center;
        flex: 1;
        transition: background 0.15s;
      }

      a.vault-link:hover {
        background: rgba(34, 211, 238, 0.06);
      }

      a.vault-link:focus-visible {
        outline: 2px solid var(--color-primary);
        outline-offset: 2px;
      }

      /* TOTP code display */
      .totp-code {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        font-family: 'SF Mono', 'Fira Code', 'JetBrains Mono', monospace;
        font-size: 14px;
        font-weight: 600;
        letter-spacing: 2px;
        color: var(--color-primary);
        padding: 4px 8px;
        margin-top: 4px;
        background: rgba(34, 211, 238, 0.06);
        border: 1px solid rgba(34, 211, 238, 0.15);
        border-radius: 6px;
        cursor: pointer;
        transition: background 0.15s, color 0.15s;
      }

      .totp-code:hover {
        background: rgba(34, 211, 238, 0.12);
      }

      /* Footer */
      .footer {
        margin-top: 10px;
        padding-top: 8px;
        text-align: center;
        font-size: 11px;
        color: var(--color-text-muted);
        opacity: 0.6;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <h1>Zero Vault <span class="version" id="version"></span></h1>
    </div>
    <div class="origin-display" id="origin-display"></div>
    <div class="connection-status" id="connection-status">
      <span class="dot disconnected"></span> 加载中…
    </div>
    <div id="root"></div>
    <div class="bottom-actions">
      <button class="scan-btn" id="scan" type="button">扫描页面</button>
      <a class="vault-link" href="#" id="open-vault" target="_blank" rel="noopener">打开密码库</a>
    </div>
    <div class="footer" id="footer"></div>
    <script type="module" src="dist/popup.js"></script>
  </body>
</html>
