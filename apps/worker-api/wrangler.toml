name = "zero-vault-api"
main = "src/index.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]
account_id = "5241ddb10b7a40275e9e3cf7a4ce3689"

[vars]
ENVIRONMENT = "development"
CORS_ORIGIN = "*"

# Local D1 database for development (created by `wrangler d1 create zero-vault-db`)
[[d1_databases]]
binding = "DB"
database_name = "zero-vault-db"
database_id = "2acefbf3-a4a8-4cd3-8549-03ccabb8307d"

# R2 bucket for exports
[[r2_buckets]]
binding = "R2"
bucket_name = "zero-vault-exports"

# Staging environment
[env.staging]
name = "zero-vault-api-staging"

[env.staging.vars]
ENVIRONMENT = "staging"
CORS_ORIGIN = "https://staging.zero-vault.dev"

# Production environment
[env.production]
name = "zero-vault-api-production"

[env.production.vars]
ENVIRONMENT = "production"
CORS_ORIGIN = "https://zero-vault.dev"
